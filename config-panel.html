<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Bridge — 视觉模型桥接配置</title>
<style>
/* ===== 全局 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:radial-gradient(ellipse at 50% 30%,#0B3E8A 0%,#073F83 30%,#063B7A 60%,#052B63 100%);color:#DDEEFF;min-height:100vh;overflow-x:hidden}
.container{max-width:960px;margin:0 auto;padding:30px 20px 60px}

/* ===== Header ===== */
.header{text-align:center;padding:40px 0 30px;position:relative}
.header h1{font-size:26px;font-weight:600;color:#D6ECFF;letter-spacing:2px;margin-bottom:6px}
.header p{font-size:13px;color:rgba(214,236,255,0.55);letter-spacing:1px}
.header::after{content:'';display:block;width:80px;height:2px;background:#25E7E7;margin:16px auto 0;box-shadow:0 0 8px rgba(37,231,231,0.5);border-radius:1px}

/* ===== 按钮 ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border:1px solid #0FA8E8;border-radius:6px;font-size:13px;color:#D6ECFF;background:rgba(15,168,232,0.1);cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.btn:hover{background:rgba(15,168,232,0.25);box-shadow:0 0 12px rgba(15,168,232,0.3)}
.btn--primary{background:rgba(15,168,232,0.25);border-color:#25E7E7;color:#fff}
.btn--primary:hover{background:rgba(37,231,231,0.3);box-shadow:0 0 16px rgba(37,231,231,0.4)}
.btn--danger{border-color:#ff5c7a;color:#ff5c7a;background:rgba(255,92,122,0.06)}
.btn--danger:hover{background:rgba(255,92,122,0.18);box-shadow:0 0 10px rgba(255,92,122,0.25)}
.btn--sm{padding:5px 12px;font-size:12px}
.btn--icon{padding:6px 10px;min-width:auto}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:24px}

/* ===== Provider 卡片 ===== */
.provider-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-top:10px}
.provider-card{background:linear-gradient(180deg,#083A76 0%,#064181 50%,#073F7B 100%);border:1px solid #0FA8E8;border-radius:8px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 0 8px rgba(15,168,232,0.2),inset 0 0 12px rgba(6,65,129,0.35)}
.provider-card::before{content:'';position:absolute;inset:2px;border-radius:6px;border:1px solid rgba(19,174,235,0.25);pointer-events:none}
.provider-card__name{font-size:16px;font-weight:600;color:#D6ECFF;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.provider-card__name .dot{width:8px;height:8px;border-radius:50%;background:#25E7E7;box-shadow:0 0 6px #25E7E7;flex-shrink:0}
.provider-card__info{font-size:12px;color:rgba(221,238,255,0.65);line-height:1.8}
.provider-card__info span{color:rgba(221,238,255,0.45)}
.provider-card__actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
.provider-card__status{font-size:11px;margin-top:8px;padding:4px 0;min-height:18px}

/* ===== 表单浮层 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(3,21,50,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:linear-gradient(180deg,#083A76 0%,#064181 50%,#073F7B 100%);border:1px solid #0FA8E8;border-radius:10px;padding:28px 30px;width:100%;max-width:480px;box-shadow:0 0 30px rgba(15,168,232,0.3);position:relative}
.modal h2{font-size:18px;font-weight:600;color:#D6ECFF;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(15,168,232,0.25)}
.modal .close-btn{position:absolute;top:14px;right:18px;font-size:20px;color:rgba(221,238,255,0.5);cursor:pointer;background:none;border:none;line-height:1}
.modal .close-btn:hover{color:#fff}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:rgba(221,238,255,0.65);margin-bottom:5px;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:9px 12px;background:rgba(5,43,99,0.6);border:1px solid rgba(15,168,232,0.35);border-radius:5px;color:#DDEEFF;font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:#25E7E7;box-shadow:0 0 8px rgba(37,231,231,0.2)}
.form-group input::placeholder{color:rgba(221,238,255,0.25)}
.form-group select{appearance:none;cursor:pointer;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2315BFFF' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;padding-right:32px}
.form-group select option{background:#063B7A;color:#DDEEFF}

/* ===== 状态标签 ===== */
.status-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px}
.status-tag--ok{background:rgba(37,231,231,0.15);color:#25E7E7}
.status-tag--fail{background:rgba(255,92,122,0.15);color:#ff5c7a}
.status-tag--pending{background:rgba(140,206,255,0.1);color:#8CCEFF}

/* ===== 空状态 ===== */
.empty-state{text-align:center;padding:60px 20px;color:rgba(221,238,255,0.4);grid-column:1/-1}
.empty-state svg{width:60px;height:60px;margin-bottom:16px;opacity:.35}
.empty-state p{font-size:14px}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 28px;border-radius:6px;font-size:13px;animation:slideDown .3s ease-out;pointer-events:none}
.toast--ok{background:rgba(37,231,231,0.2);border:1px solid #25E7E7;color:#25E7E7}
.toast--err{background:rgba(255,92,122,0.2);border:1px solid #ff5c7a;color:#ff5c7a}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🔮 Vision Bridge</h1>
    <p>视觉模型桥接配置 — 支持 Anthropic · OpenAI · Gemini</p>
  </div>

  <!-- 操作栏 -->
  <div class="btn-row">
    <button class="btn btn--primary" onclick="openModal()">+ 添加 Provider</button>
    <button class="btn" onclick="saveConfig()">💾 保存配置</button>
  </div>

  <!-- Provider 列表 -->
  <div class="provider-list" id="providerList">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <p>暂无 Provider，点击上方按钮添加</p>
    </div>
  </div>
</div>

<!-- 编辑浮层 -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">添加 Provider</h2>
    <input type="hidden" id="editIndex" value="-1">
    <div class="form-group">
      <label>名称 *</label>
      <input id="fName" placeholder="例如：Claude中转站、ChatGPT、Gemini">
    </div>
    <div class="form-group">
      <label>Base URL *</label>
      <input id="fUrl" placeholder="例如：https://mzlone.top">
    </div>
    <div class="form-group">
      <label>API Key *</label>
      <input id="fKey" type="password" placeholder="sk-...">
    </div>
    <div class="form-group">
      <label>Model *</label>
      <input id="fModel" placeholder="例如：claude-opus-4-6 / gpt-4o / gemini-2.0-flash">
    </div>
    <div class="form-group">
      <label>API 格式 *</label>
      <select id="fFormat">
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
        <option value="gemini">Gemini</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn--primary" onclick="saveProvider()">确定</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
// ===== 状态 =====
let providers = [];
let editingIndex = -1;

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', loadConfig);

async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    const data = await res.json();
    providers = data.providers || [];
    render();
  } catch (e) {
    toast('无法加载配置，请确保已启动 server.py', 'err');
  }
}

// ===== 渲染 =====
function render() {
  const list = document.getElementById('providerList');
  if (providers.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <p>暂无 Provider，点击上方按钮添加</p>
    </div>`;
    return;
  }

  list.innerHTML = providers.map((p, i) => {
    const fmtLabel = {anthropic:'Anthropic',openai:'OpenAI',gemini:'Gemini'}[p.api_format] || p.api_format;
    return `<div class="provider-card">
      <div class="provider-card__name">
        <span class="dot"></span>${esc(p.name)}
      </div>
      <div class="provider-card__info">
        <span>格式</span> ${fmtLabel} &nbsp;|&nbsp; <span>模型</span> ${esc(p.model)}<br>
        <span>地址</span> ${esc(p.base_url)}
      </div>
      <div class="provider-card__actions">
        <button class="btn btn--sm" onclick="editProvider(${i})">✏️ 编辑</button>
        <button class="btn btn--sm" onclick="testProvider(${i})">🔍 测试</button>
        <button class="btn btn--sm btn--danger" onclick="deleteProvider(${i})">🗑 删除</button>
      </div>
      <div class="provider-card__status" id="status-${i}"></div>
    </div>`;
  }).join('');
}

// ===== CRUD =====
function openModal(index = -1) {
  editingIndex = index;
  document.getElementById('modalTitle').textContent = index >= 0 ? '编辑 Provider' : '添加 Provider';
  document.getElementById('editIndex').value = index;
  document.getElementById('fName').value = index >= 0 ? providers[index].name : '';
  document.getElementById('fUrl').value = index >= 0 ? providers[index].base_url : '';
  document.getElementById('fKey').value = index >= 0 ? providers[index].api_key : '';
  document.getElementById('fModel').value = index >= 0 ? providers[index].model : '';
  document.getElementById('fFormat').value = index >= 0 ? (providers[index].api_format || 'anthropic') : 'anthropic';
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function saveProvider() {
  const name = document.getElementById('fName').value.trim();
  const base_url = document.getElementById('fUrl').value.trim();
  const api_key = document.getElementById('fKey').value.trim();
  const model = document.getElementById('fModel').value.trim();
  const api_format = document.getElementById('fFormat').value;

  if (!name || !base_url || !api_key || !model) {
    toast('请填写所有必填字段', 'err'); return;
  }

  const entry = { name, base_url, api_key, model, api_format };
  const idx = parseInt(document.getElementById('editIndex').value);

  if (idx >= 0) {
    providers[idx] = entry;
  } else {
    providers.push(entry);
  }

  closeModal();
  render();
  toast(name + ' 已' + (idx >= 0 ? '更新' : '添加'));
}

function editProvider(i) { openModal(i); }
function deleteProvider(i) {
  const name = providers[i].name;
  if (confirm(`确定删除 "${name}" 吗？此操作不可撤销。`)) {
    providers.splice(i, 1);
    render();
    toast(name + ' 已删除');
  }
}

async function saveConfig() {
  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ providers })
    });
    const data = await res.json();
    if (data.ok) toast('配置已保存 ✅', 'ok');
    else toast('保存失败: ' + data.error, 'err');
  } catch (e) {
    toast('保存失败: ' + e.message, 'err');
  }
}

// ===== 测试连接 =====
async function testProvider(i) {
  const p = providers[i];
  const statusEl = document.getElementById('status-' + i);
  statusEl.innerHTML = '<span class="status-tag status-tag--pending">测试中...</span>';

  try {
    const res = await fetch('/api/test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(p)
    });
    const data = await res.json();
    if (data.ok) {
      statusEl.innerHTML = '<span class="status-tag status-tag--ok">✓ ' + data.message + '</span>';
    } else {
      statusEl.innerHTML = '<span class="status-tag status-tag--fail">✗ ' + data.message + '</span>';
    }
  } catch (e) {
    statusEl.innerHTML = '<span class="status-tag status-tag--fail">请求失败: ' + e.message + '</span>';
  }
}

// ===== 工具 =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, type) {
  type = type || 'ok';
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast toast--' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
</script>
</body>
</html>
